<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Vocab X√Ęy DŠĽĪng Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #f43f5e; --bg-card: rgba(15, 23, 42, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        
        body { 
            background: #0f172a url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2000') no-repeat center center fixed; 
            background-size: cover; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        /* Giao diŠĽán K√≠nh mŠĽĚ - ńźŠļĻp v√† Sang */
        .glass-container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; width: 100%; max-width: 1100px; padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            color: white; display: flex; flex-direction: column; gap: 20px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .tab-group { display: flex; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 12px; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 10px; background: transparent; color: #94a3b8; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }

        .stat-group { display: flex; gap: 15px; font-weight: 700; color: #facc15; }
        .stat-item { background: rgba(0,0,0,0.2); padding: 8px 18px; border-radius: 12px; }

        .main-layout { display: grid; grid-template-columns: 240px 1fr 1.2fr; gap: 25px; height: 500px; }

        /* CŠĽôt 1: Danh s√°ch tŠĽę */
        .sidebar { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 12px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .menu-item { 
            padding: 12px; margin-bottom: 7px; border-radius: 10px; cursor: pointer;
            background: rgba(255,255,255,0.03); border: 2px solid transparent; font-weight: 600; font-size: 14px;
        }
        .menu-item.active { background: rgba(99, 102, 241, 0.2); border-color: var(--primary); color: white; }

        /* CŠĽôt 2: ŠļĘnh */
        .preview-box { border-radius: 20px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1); background: #eee; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* CŠĽôt 3: NŠĽôi dung c√Ęu hŠĽŹi */
        .quiz-panel { display: flex; flex-direction: column; gap: 18px; }
        .question-card { background: rgba(0,0,0,0.2); padding: 25px; border-radius: 20px; font-size: 22px; font-weight: 600; line-height: 1.5; border-left: 6px solid var(--primary); }
        .blank { color: #facc15; font-weight: 700; border-bottom: 2px solid #facc15; }

        /* N√ļt lŠĽĪa chŠĽćn (4 √ī) */
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-btn { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.08); padding: 18px; border-radius: 15px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; text-align: center; font-size: 16px; }
        .option-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); transform: translateY(-3px); }
        
        /* M√†u khi chŠĽćn ńĎ√°p √°n */
        .correct { background: #16a34a !important; border-color: #22c55e !important; color: white !important; }
        .wrong { background: #ef4444 !important; border-color: #f87171 !important; color: white !important; }

        /* GiŠļ£i th√≠ch */
        .explanation { background: rgba(99, 102, 241, 0.15); padding: 20px; border-radius: 20px; display: none; }
        .ipa { font-style: italic; opacity: 0.8; margin-top: 5px; font-size: 16px; color: #cbd5e1; }
        .speaker-btn { background: var(--primary); color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-left: 10px; }

        /* N√ļt tiŠļŅp theo */
        .btn-action { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #fff; color: #000; font-weight: 700; font-size: 18px; cursor: pointer; margin-top: auto; display: none; }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header">
        <div class="tab-group">
            <button class="tab-btn active" onclick="setTab('learn')">‚úćÔłŹ HŠĽćc tŠļ≠p</button>
            <button class="tab-btn" onclick="setTab('config')">‚öôÔłŹ Th√™m tŠĽę</button>
        </div>
        <div class="stat-group">
            <div class="stat-item">ūüĒ• Streak: <span id="val-streak">1</span></div>
            <div class="stat-item">ńź√ļng: <span id="val-total">0</span></div>
        </div>
    </div>

    <div id="page-learn" class="main-layout">
        <div class="sidebar" id="menu-list"></div>
        <div class="preview-box">
            <img id="quiz-img" src="">
        </div>
        <div class="quiz-panel">
            <div class="question-card" id="quiz-text">ńźang tŠļ£i...</div>
            <div class="option-grid" id="option-grid"></div>
            <div class="explanation" id="exp-box">
                <div style="display:flex; align-items:center; margin-bottom:10px;">
                    <h3 id="fb-word" style="font-size:24px; color:#facc15"></h3>
                    <button class="speaker-btn" onclick="sayIt()">ūüĒä Nghe lŠļ°i</button>
                </div>
                <div class="ipa" id="fb-ipa"></div>
                <p id="fb-def" style="margin-top:10px; font-weight: 600; font-size: 16px; color: #e2e8f0;"></p>
            </div>
            <button class="btn-action" id="btn-next" onclick="next()">TIŠļĺP THEO ‚ěĒ</button>
        </div>
    </div>

    <div id="page-config" style="display:none; flex-direction:column; gap:20px">
        <textarea id="json-input" style="width:100%; height:350px; background:rgba(0,0,0,0.3); border:2px solid var(--primary); border-radius:15px; padding:15px; color:#4ade80; font-family:monospace;" placeholder="D√°n JSON v√†o ńĎ√Ęy..."></textarea>
        <button onclick="saveData()" style="padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">L∆ĮU V√Ä BŠļģT ńźŠļ¶U</button>
    </div>
</div>

<script>
    // DŠĽĮ liŠĽáu mŠļ∑c ńĎŠĽčnh 18 tŠĽę cŠĽßa bŠļ°n
    const defaultData = [
        {"word":"Abutment","definition":"MŠĽĎ cŠļßu","ipa":"/…ôňąb Ćtm…ônt/","example":"The bridge abutment provides support.","img":"https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=800"},
        {"word":"Cantilever","definition":"DŠļßm c√īng-x√īn","ipa":"/ňąk√¶nt…™liňźv…ôr/","example":"The balcony was a cantilever design.","img":"https://images.unsplash.com/photo-1518005020251-582c7897655d?w=800"},
        {"word":"Load-bearing","definition":"ChŠĽču lŠĽĪc","ipa":"/ňąlo ädňĆber…™Ňč/","example":"Load-bearing walls are essential.","img":"https://images.unsplash.com/photo-1503387762-592dea58ef23?w=800"},
        {"word":"Steel","definition":"Th√©p","ipa":"/stiňźl/","example":"Skyscrapers rely on high-strength steel.","img":"https://images.unsplash.com/photo-1516156008625-3a9d6067fab5?w=800"},
        {"word":"Compress","definition":"N√©n","ipa":"/k…ômňąpres/","example":"Try to compress the concrete.","img":"https://images.unsplash.com/photo-1533038590840-1cde6b66b721?w=800"},
        {"word":"Granite","definition":"ńź√° Granite","ipa":"/ňą…°r√¶n…™t/","example":"The building base was faced in granite.","img":"https://images.unsplash.com/photo-1525498128493-380d1990a112?w=800"},
        {"word":"Ratio","definition":"TŠĽ∑ lŠĽá","ipa":"/ňąre…™ Éio ä/","example":"The cement ratio is crucial.","img":"https://images.unsplash.com/photo-1589939705384-5185137a7f0f?w=800"},
        {"word":"Cables","definition":"D√Ęy c√°p","ipa":"/ňąke…™blz/","example":"The suspension bridge used huge cables.","img":"https://images.unsplash.com/photo-1445023086979-7244a12345a8?w=800"},
        {"word":"Truss","definition":"Gi√†n (k√®o)","ipa":"/tr Ćs/","example":"A timber truss supported the roof.","img":"https://images.unsplash.com/photo-1513828583688-c52646db42da?w=800"},
        {"word":"Foundation","definition":"M√≥ng nh√†","ipa":"/fa änňąde…™ Én/","example":"Dig deep for a solid foundation.","img":"https://images.unsplash.com/photo-1584467541268-b040f83be3fd?w=800"},
        {"word":"Reinforcement","definition":"CŠĽĎt th√©p","ipa":"/ňĆriňź…™nňąf…Ēňźrsm…ônt/","example":"Reinforcement increases tensile strength.","img":"https://images.unsplash.com/photo-1590634308295-ce21e8a7f4de?w=800"},
        {"word":"Column","definition":"CŠĽôt","ipa":"/ňąk…Ďňźl…ôm/","example":"They used Greek columns in the design.","img":"https://images.unsplash.com/photo-1515263487990-61b07816b324?w=800"},
        {"word":"Beam","definition":"DŠļßm","ipa":"/biňźm/","example":"Place the steel beam across.","img":"https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=800"},
        {"word":"Arch","definition":"V√≤m","ipa":"/…Ďňźrt É/","example":"The Roman arch was an innovation.","img":"https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=800"},
        {"word":"Span","definition":"NhŠĽčp bridge","ipa":"/sp√¶n/","example":"The total span of the bridge is 2km.","img":"https://images.unsplash.com/photo-1449034446853-66c86144b0ad?w=800"},
        {"word":"Scaffolding","definition":"Gi√†n gi√°o","ipa":"/ňąsk√¶f…ôld…™Ňč/","example":"Scaffolding went up around the site.","img":"https://images.unsplash.com/photo-1503387762-592dea58ef23?w=800"},
        {"word":"Blueprint","definition":"BŠļ£n thiŠļŅt kŠļŅ","ipa":"/ňąbluňźpr…™nt/","example":"The architect drew the first blueprint.","img":"https://images.unsplash.com/photo-1503387762-592dea58ef23?w=800"},
        {"word":"Excavation","definition":"ViŠĽác ńĎ√†o ńĎŠļ•t","ipa":"/ňĆeksk…ôňąve…™ Én/","example":"Excavation began for the basement.","img":"https://images.unsplash.com/photo-1541888946425-d81bb19480c5?w=800"}
    ];

    let vocabulary = [], currentIdx = 0, score = 0;

    window.onload = () => {
        // TŠĽĪ dŠĽćn dŠļĻp bŠĽô nhŠĽõ ńĎŠĽám cŇ© ńĎŠĽÉ ńĎŠļ£m bŠļ£o web chŠļ°y m∆įŠĽ£t
        const keysToRemove = ['v_st', 'v_final', 'v3_data', 'v_data'];
        keysToRemove.forEach(k => localStorage.removeItem(k));
        
        const savedData = localStorage.getItem('vocab_lux_v1');
        if(savedData) vocabulary = JSON.parse(savedData);
        else vocabulary = defaultData;
        
        renderApp();
    };

    function renderApp() {
        if(!vocabulary.length) return;
        
        // CŠĽôt 1: Danh s√°ch tŠĽę
        const menu = document.getElementById('menu-list');
        menu.innerHTML = "";
        vocabulary.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = `menu-item ${i === currentIdx ? 'active' : ''}`;
            div.innerText = `${i+1}. ${item.word}`;
            div.onclick = () => { currentIdx = i; renderApp(); };
            menu.appendChild(div);
        });

        const activeItem = vocabulary[currentIdx];
        document.getElementById('quiz-img').src = activeItem.img;
        document.getElementById('quiz-text').innerHTML = activeItem.example.replace(new RegExp(activeItem.word, 'gi'), '<span class="blank">_______</span>');

        // TŠļ°o 4 ńĎ√°p √°n (1 ńĎ√ļng, 3 ngŠļęu nhi√™n)
        const grid = document.getElementById('option-grid');
        grid.innerHTML = "";
        let options = [activeItem.word];
        while(options.length < Math.min(4, vocabulary.length)) {
            let rWord = vocabulary[Math.floor(Math.random()*vocabulary.length)].word;
            if(!options.includes(rWord)) options.push(rWord);
        }
        options.sort(() => Math.random() - 0.5);

        // HiŠĽÉn thŠĽč n√ļt lŠĽĪa chŠĽćn
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                // Kh√≥a lŠĽĪa chŠĽćn v√† hiŠĽán giŠļ£i th√≠ch
                document.querySelectorAll('.option-btn').forEach(b => b.style.pointerEvents = 'none');
                if(opt === activeItem.word) {
                    btn.classList.add('correct');
                    score++;
                } else {
                    btn.classList.add('wrong');
                    document.querySelectorAll('.option-btn').forEach(b => {
                        if(b.innerText === activeItem.word) b.classList.add('correct');
                    });
                }
                
                document.getElementById('val-total').innerText = score;
                document.getElementById('fb-word').innerText = activeItem.word;
                document.getElementById('fb-ipa').innerText = activeItem.ipa;
                document.getElementById('fb-def').innerText = "Nghń©a: " + activeItem.definition;
                document.getElementById('exp-box').style.display = 'block';
                document.getElementById('btn-next').style.display = 'block';
                sayIt();
            };
            grid.appendChild(btn);
        });

        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';
    }

    // Ph√°t √Ęm chuŠļ©n MŠĽĻ
    function sayIt() {
        const msg = new SpeechSynthesisUtterance(vocabulary[currentIdx].word);
        msg.lang = 'en-US'; window.speechSynthesis.speak(msg);
    }

    function next() { currentIdx = (currentIdx + 1) % vocabulary.length; renderApp(); }

    function setTab(p) {
        document.getElementById('page-learn').style.display = p === 'learn' ? 'grid' : 'none';
        document.getElementById('page-config').style.display = p === 'config' ? 'flex' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.className = 'tab-btn');
        event.target.className = 'tab-btn active';
        if(p==='config') document.getElementById('json-input').value = JSON.stringify(vocabulary, null, 2);
    }

    function saveData() {
        try {
            const val = document.getElementById('json-input').value;
            JSON.parse(val); localStorage.setItem('vocab_lux_v1', val); location.reload();
        } catch(e) { alert("LŠĽói JSON!"); }
    }
</script>
</body>
</html>
