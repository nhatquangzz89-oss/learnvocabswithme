<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Từ Vựng Xây Dựng - Cloze Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --g: rgba(255, 255, 255, 0.15); --border: rgba(255, 255, 255, 0.3); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { 
            background: #1a1a2e url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80') no-repeat center center fixed; 
            background-size: cover; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; 
        }
        .app-card { width: 95%; max-width: 1000px; background: var(--g); backdrop-filter: blur(25px); border-radius: 30px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        
        /* Header Stats */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .stats { display: flex; gap: 15px; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-val { font-weight: bold; color: var(--p); display: block; font-size: 18px; }
        .stat-lbl { font-size: 10px; text-transform: uppercase; opacity: 0.7; }

        .nav-btn { padding: 10px 20px; border: none; border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; }
        .nav-btn.active { background: var(--p); font-weight: bold; }

        /* Layout Ngang */
        .quiz-container { display: flex; gap: 30px; align-items: stretch; }
        .quiz-left { flex: 1; position: relative; }
        .q-img { width: 100%; height: 400px; object-fit: cover; border-radius: 20px; border: 1px solid var(--border); }
        
        .quiz-right { flex: 1.2; display: flex; flex-direction: column; justify-content: center; }
        .sentence-box { font-size: 22px; line-height: 1.5; margin-bottom: 25px; background: rgba(0,0,0,0.1); padding: 20px; border-radius: 15px; border-left: 5px solid var(--p); }
        .blank { color: var(--p); font-weight: bold; text-decoration: underline; padding: 0 5px; }

        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; text-align: center; }
        .opt-item:hover { background: rgba(255,255,255,0.2); }
        
        .correct { background: #22c55e !important; border-color: #22c55e; }
        .wrong { background: #ef4444 !important; border-color: #ef4444; }

        #expl-area { margin-top: 20px; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.1); display: none; }
        .btn-next { width: 100%; padding: 18px; border: none; border-radius: 15px; background: #fff; color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header-top">
        <div style="display:flex; gap:10px">
            <button class="nav-btn active" onclick="tab('quiz')">✍️ Học tập</button>
            <button class="nav-btn" onclick="tab('conf')">⚙️ Cài đặt</button>
        </div>
        <div class="stats">
            <div class="stat-box"><span class="stat-val" id="st-learned">0</span><span class="stat-lbl">Đã học</span></div>
            <div class="stat-box"><span class="stat-val" id="st-accuracy">0%</span><span class="stat-lbl">Chính xác</span></div>
        </div>
    </div>

    <div id="quiz-sec">
        <div class="quiz-container">
            <div class="quiz-left">
                <img id="q-img" class="q-img" src="">
            </div>
            <div class="quiz-right">
                <div class="sentence-box" id="q-sentence">Đang tải câu hỏi...</div>
                <div class="opt-grid" id="opt-box"></div>
                <div id="expl-area">
                    <h3 id="correct-word" style="color:var(--p)"></h3>
                    <p id="word-def" style="opacity:0.9; margin-top:5px"></p>
                </div>
                <button id="btn-next" class="btn-next" style="display:none" onclick="next()">Tiếp theo ➔</button>
            </div>
        </div>
    </div>

    <div id="conf-sec" style="display:none">
        <textarea id="json-input" style="width:100%; height:300px; background:rgba(0,0,0,0.2); color:#fff; padding:15px; border-radius:15px; margin-bottom:15px;" placeholder="Dán JSON từ vựng của bạn vào đây..."></textarea>
        <button class="nav-btn active" style="width:100%" onclick="save()">💾 Cập nhật bộ từ vựng</button>
    </div>
</div>

<script>
    let vocab = [], curIdx = 0;
    let stats = { total: 0, right: 0 };

    window.onload = () => {
        const d = localStorage.getItem('v_data');
        const s = localStorage.getItem('v_stats');
        if(s) stats = JSON.parse(s);
        if(d) { vocab = JSON.parse(d); render(); } else tab('conf');
        updateStats();
    };

    function tab(t) {
        document.getElementById('quiz-sec').style.display = t==='quiz'?'block':'none';
        document.getElementById('conf-sec').style.display = t==='conf'?'block':'none';
    }

    function render() {
        const item = vocab[curIdx];
        const sentence = item.example || item.explanation || "";
        // Thuật toán tạo lỗ trống: Thay thế từ khóa bằng ___
        const clozeSentence = sentence.replace(new RegExp(item.word, 'gi'), '<span class="blank">_______</span>');
        
        document.getElementById('q-sentence').innerHTML = clozeSentence;
        document.getElementById('q-img').src = item.image || item.img;
        
        const box = document.getElementById('opt-box'); box.innerHTML = '';
        let opts = [item.word];
        while(opts.length < 4) {
            let r = vocab[Math.floor(Math.random()*vocab.length)].word;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        opts.forEach(o => {
            const btn = document.createElement('div'); btn.className = 'opt-item'; btn.innerText = o;
            btn.onclick = () => check(o, item.word, btn);
            box.appendChild(btn);
        });
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('expl-area').style.display = 'none';
    }

    function check(selected, correct, el) {
        document.querySelectorAll('.opt-item').forEach(b => b.style.pointerEvents = 'none');
        stats.total++;
        if(selected.toLowerCase() === correct.toLowerCase()) {
            el.classList.add('correct');
            stats.right++;
        } else {
            el.classList.add('wrong');
            document.querySelectorAll('.opt-item').forEach(b => { if(b.innerText.toLowerCase() === correct.toLowerCase()) b.classList.add('correct'); });
        }
        
        const item = vocab[curIdx];
        document.getElementById('correct-word').innerText = item.word + " " + (item.ipa || "");
        document.getElementById('word-def').innerText = item.definition;
        document.getElementById('expl-area').style.display = 'block';
        document.getElementById('btn-next').style.display = 'block';
        
        updateStats();
        const u = new SpeechSynthesisUtterance(item.word); u.lang = 'en-US'; speechSynthesis.speak(u);
    }

    function updateStats() {
        document.getElementById('st-learned').innerText = stats.total;
        const acc = stats.total === 0 ? 0 : Math.round((stats.right / stats.total) * 100);
        document.getElementById('st-accuracy').innerText = acc + "%";
        localStorage.setItem('v_stats', JSON.stringify(stats));
    }

    function next() {
        // Duy trì sự lặp lại: Chọn ngẫu nhiên hoặc theo thứ tự
        curIdx = (curIdx + 1) % vocab.length;
        render();
    }

    function save() {
        try {
            const d = JSON.parse(document.getElementById('json-input').value);
            localStorage.setItem('v_data', JSON.stringify(d));
            location.reload();
        } catch(e) { alert("Lỗi JSON!"); }
    }
</script>
</body>
</html>
