<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Từ Vựng Xây Dựng - Ngang</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --g: rgba(255, 255, 255, 0.15); --border: rgba(255, 255, 255, 0.3); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: #1a1a2e url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80') no-repeat center center fixed; 
            background-size: cover; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; 
        }

        .app-card { 
            width: 95%; max-width: 900px; background: var(--g); backdrop-filter: blur(25px); 
            border-radius: 30px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.3); 
        }

        /* Tracking Header */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 20px; }
        .stats-grid { display: flex; gap: 10px; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 15px; text-align: center; border: 1px solid var(--border); min-width: 100px; }
        .stat-val { font-size: 18px; font-weight: bold; color: #6366f1; }
        .stat-lbl { font-size: 10px; opacity: 0.8; text-transform: uppercase; display: block; }

        .nav { display: flex; gap: 10px; }
        .nav-btn { padding: 10px 25px; border: none; border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--p); font-weight: bold; }

        /* GIAO DIỆN NẰM NGANG */
        .quiz-container { display: flex; gap: 30px; align-items: start; min-height: 400px; }
        
        .quiz-left { flex: 1.2; } /* Phần hình ảnh */
        .q-img { width: 100%; height: 350px; object-fit: cover; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .quiz-right { flex: 1; display: flex; flex-direction: column; } /* Phần nội dung học */
        .q-word { font-size: 32px; margin-bottom: 5px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .q-ipa { font-style: italic; opacity: 0.7; margin-bottom: 20px; font-size: 18px; }

        .opt-list { display: grid; gap: 10px; }
        .opt-item { background: rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; font-size: 16px; }
        .opt-item:hover { background: rgba(255,255,255,0.2); transform: translateX(5px); }
        
        .correct { background: #22c55e !important; border-color: #22c55e; }
        .wrong { background: #ef4444 !important; border-color: #ef4444; }

        #expl-box { margin-top: 15px; padding: 15px; border-radius: 12px; background: rgba(99, 102, 241, 0.2); border-left: 4px solid var(--p); display: none; }

        /* Form */
        textarea { width: 100%; height: 300px; background: rgba(0,0,0,0.2); color: #fff; padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 15px; outline: none; }
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 15px; background: var(--p); color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }

        @media (max-width: 768px) {
            .quiz-container { flex-direction: column; }
            .q-img { height: 200px; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header-top">
        <div class="nav">
            <button class="nav-btn active" id="btn-quiz" onclick="show('quiz')">✍️ Học tập</button>
            <button class="nav-btn" id="btn-conf" onclick="show('conf')">⚙️ Cài đặt</button>
        </div>
        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-lbl">Đã học</span>
                <span class="stat-val" id="st-learned">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-lbl">Câu đúng</span>
                <span class="stat-val" id="st-correct">0</span>
            </div>
        </div>
    </div>

    <div id="quiz-sec">
        <div id="quiz-ui" class="quiz-container">
            <div class="quiz-left">
                <img id="main-img" class="q-img" src="">
            </div>
            <div class="quiz-right">
                <h2 class="q-word" id="main-word">...</h2>
                <div class="q-ipa" id="main-ipa"></div>
                <div class="opt-list" id="opt-container"></div>
                <div id="expl-box"></div>
                <button id="next-btn" class="btn-main" style="display:none" onclick="goNext()">Tiếp theo ➔</button>
            </div>
        </div>
        <div id="empty-state" style="display:none; text-align:center; padding: 50px;">
            <p>Vui lòng nạp JSON trong tab Cài đặt!</p>
        </div>
    </div>

    <div id="config-sec" style="display:none">
        <textarea id="json-input" placeholder="Dán mã JSON tại đây..."></textarea>
        <button class="btn-main" onclick="save()">💾 Lưu bài học</button>
    </div>
</div>

<script>
    let vocab = [], cur = 0;
    let score = { learned: 0, correct: 0 };

    window.onload = () => {
        const sData = localStorage.getItem('v_data');
        const sScore = localStorage.getItem('v_score');
        if(sScore) score = JSON.parse(sScore);
        updateStats();

        if(sData) {
            vocab = JSON.parse(sData);
            cur = parseInt(localStorage.getItem('v_cur') || 0);
            render();
        } else show('conf');
    };

    function show(t) {
        document.getElementById('quiz-sec').style.display = t==='quiz'?'block':'none';
        document.getElementById('config-sec').style.display = t==='conf'?'block':'none';
        document.getElementById('btn-quiz').classList.toggle('active', t==='quiz');
        document.getElementById('btn-conf').classList.toggle('active', t==='conf');
    }

    function render() {
        if(!vocab.length) return;
        const item = vocab[cur];
        document.getElementById('main-word').innerText = item.word || item.question;
        document.getElementById('main-ipa').innerText = item.ipa || '';
        document.getElementById('main-img').src = item.image || item.img;
        
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        
        let choices = item.options || [item.definition];
        if(choices.length < 2) {
            choices = [item.definition];
            while(choices.length < 4) {
                let r = vocab[Math.floor(Math.random()*vocab.length)].definition;
                if(!choices.includes(r)) choices.push(r);
            }
            choices.sort(() => Math.random() - 0.5);
        }

        choices.forEach(o => {
            const el = document.createElement('div');
            el.className = 'opt-item';
            el.innerText = o;
            el.onclick = () => {
                document.querySelectorAll('.opt-item').forEach(b => b.style.pointerEvents = 'none');
                const expl = document.getElementById('expl-box');
                
                if(o === item.definition) {
                    el.classList.add('correct');
                    score.correct++;
                    expl.innerHTML = `✅ <b>Chính xác!</b><br>${item.explanation || ''}`;
                } else {
                    el.classList.add('wrong');
                    document.querySelectorAll('.opt-item').forEach(b => { if(b.innerText === item.definition) b.classList.add('correct'); });
                    expl.innerHTML = `❌ <b>Sai rồi!</b> Đáp án: ${item.definition}<br>${item.explanation || ''}`;
                }
                expl.style.display = 'block';
                score.learned++;
                updateStats();
                document.getElementById('next-btn').style.display = 'block';
                const u = new SpeechSynthesisUtterance(item.word || item.question);
                u.lang = 'en-US'; speechSynthesis.speak(u);
            };
            container.appendChild(el);
        });
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('expl-box').style.display = 'none';
    }

    function updateStats() {
        document.getElementById('st-learned').innerText = score.learned;
        document.getElementById('st-correct').innerText = score.correct;
        localStorage.setItem('v_score', JSON.stringify(score));
    }

    function goNext() {
        cur = (cur + 1) % vocab.length;
        localStorage.setItem('v_cur', cur);
        render();
    }

    function save() {
        try {
            const d = JSON.parse(document.getElementById('json-input').value);
            localStorage.setItem('v_data', JSON.stringify(d));
            location.reload();
        } catch(e) { alert("Lỗi JSON!"); }
    }
</script>
</body>
</html>
