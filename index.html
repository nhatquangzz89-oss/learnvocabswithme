<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học Từ Vựng - Fix Triệt Để</title>
    <style>
        :root { --p: #4f46e5; }
        body { font-family: sans-serif; background: #0f172a; color: #334155; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 1000px; background: white; border-radius: 15px; padding: 20px; min-height: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .nav-btn { padding: 10px 20px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; background: #e2e8f0; }
        .nav-btn.active { background: var(--p); color: white; }
        
        .main { display: grid; grid-template-columns: 200px 1fr 1.2fr; gap: 20px; }
        .menu { height: 450px; overflow-y: auto; background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .m-item { padding: 10px; margin-bottom: 5px; background: white; border-radius: 5px; cursor: pointer; font-size: 13px; border: 1px solid #eee; }
        .m-item.active { border-color: var(--p); color: var(--p); font-weight: bold; }
        
        .img-box { height: 300px; background: #eee; border-radius: 10px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .q-box { padding: 15px; }
        .sentence { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #000; }
        .blank { color: var(--p); border-bottom: 2px solid var(--p); padding: 0 10px; }
        
        .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; text-align: center; font-weight: bold; }
        .correct { background: #22c55e !important; color: white; border-color: #16a34a; }
        .wrong { background: #ef4444 !important; color: white; border-color: #b91c1c; }
        
        .ans-box { margin-top: 15px; padding: 15px; background: #f1f5f9; border-radius: 10px; display: none; }
        .btn-next { width: 100%; padding: 15px; background: #1e293b; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div>
            <button class="nav-btn active" id="b-q" onclick="setTab('q')">HỌC TẬP</button>
            <button class="nav-btn" id="b-c" onclick="setTab('c')">CÀI ĐẶT</button>
        </div>
        <div style="font-weight: bold;">
            🔥 Streak: <span id="s-streak">0</span> | Đã học: <span id="s-total">0</span>
        </div>
    </div>

    <div id="p-q" class="main">
        <div class="menu" id="menu"></div>
        <div class="img-box"><img id="img" src=""></div>
        <div class="q-box">
            <div class="sentence" id="q-txt">Chưa có dữ liệu...</div>
            <div class="opts" id="opts"></div>
            <div class="ans-box" id="ans">
                <strong id="ans-w"></strong>: <span id="ans-d"></span>
            </div>
            <button class="btn-next" id="btn-n" style="display:none" onclick="goNext()">TIẾP THEO ➔</button>
        </div>
    </div>

    <div id="p-c" style="display:none">
        <textarea id="inp" style="width:100%; height:300px; margin-bottom:10px;" placeholder="Dán JSON vào đây..."></textarea>
        <button class="btn-next" style="background:var(--p)" onclick="doSave()">LƯU VÀ CHẠY LẠI</button>
        <p style="color:red; margin-top:10px;">* Lưu ý: Nếu web vẫn lỗi, hãy nhấn Ctrl + F5.</p>
    </div>
</div>

<script>
    let db = [], cur = 0, st = {total:0, day:"", streak:1};

    window.onload = () => {
        const d = localStorage.getItem('v_final');
        const s = localStorage.getItem('v_st');
        if(s) st = JSON.parse(s);
        
        // Streak logic
        const today = new Date().toDateString();
        if(st.day && st.day !== today) {
            const gap = (new Date(today) - new Date(st.day)) / 86400000;
            st.streak = (gap === 1) ? st.streak + 1 : 1;
        }
        st.day = today;

        if(d) { db = JSON.parse(d); show(); } 
        else { setTab('c'); }
        updateStats();
    };

    function show() {
        if(!db.length) return;
        const m = document.getElementById('menu'); m.innerHTML = "";
        db.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = `m-item ${i===cur?'active':''}`;
            div.innerText = `${i+1}. ${item.word}`;
            div.onclick = () => { cur=i; show(); };
            m.appendChild(div);
        });

        const it = db[cur];
        document.getElementById('img').src = it.img;
        document.getElementById('q-txt').innerHTML = it.example.replace(new RegExp(it.word, 'gi'), '<span class="blank">_______</span>');
        
        const oBox = document.getElementById('opts'); oBox.innerHTML = "";
        let cs = [it.word];
        while(cs.length < 4) {
            let r = db[Math.floor(Math.random()*db.length)].word;
            if(!cs.includes(r)) cs.push(r);
        }
        cs.sort(() => Math.random() - 0.5).forEach(c => {
            const b = document.createElement('div'); b.className = 'opt'; b.innerText = c;
            b.onclick = () => {
                document.querySelectorAll('.opt').forEach(x => x.style.pointerEvents = 'none');
                if(c === it.word) { b.classList.add('correct'); st.total++; }
                else { 
                    b.classList.add('wrong');
                    document.querySelectorAll('.opt').forEach(x => { if(x.innerText === it.word) x.classList.add('correct'); });
                }
                document.getElementById('ans-w').innerText = it.word;
                document.getElementById('ans-d').innerText = it.definition;
                document.getElementById('ans').style.display = 'block';
                document.getElementById('btn-n').style.display = 'block';
                updateStats();
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(it.word));
            };
            oBox.appendChild(b);
        });
        document.getElementById('ans').style.display = 'none';
        document.getElementById('btn-n').style.display = 'none';
    }

    function updateStats() {
        document.getElementById('s-total').innerText = st.total;
        document.getElementById('s-streak').innerText = st.streak;
        localStorage.setItem('v_st', JSON.stringify(st));
    }
    function goNext() { cur = (cur + 1) % db.length; show(); }
    function setTab(t) {
        document.getElementById('p-q').style.display = t==='q'?'grid':'none';
        document.getElementById('p-c').style.display = t==='c'?'block':'none';
        document.getElementById('b-q').className = t==='q'?'nav-btn active':'nav-btn';
        document.getElementById('b-c').className = t==='c'?'nav-btn active':'nav-btn';
    }
    function doSave() {
        const val = document.getElementById('inp').value;
        if(val) { localStorage.setItem('v_final', val); location.reload(); }
    }
</script>
</body>
</html>
