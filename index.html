<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học Từ Vựng Xây Dựng - Final Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --bg: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        body { 
            background: var(--bg) url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2000') no-repeat center center fixed; 
            background-size: cover; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; width: 100%; max-width: 1100px;
            padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); color: white;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .nav { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 12px; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 10px; background: transparent; color: #94a3b8; font-weight: 700; cursor: pointer; }
        .nav-btn.active { background: var(--p); color: white; }
        .stats { display: flex; gap: 15px; font-weight: 700; color: #facc15; }

        .main { display: grid; grid-template-columns: 240px 1fr 1fr; gap: 20px; height: 500px; }
        .menu { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 10px; overflow-y: auto; }
        .m-item { padding: 12px; margin-bottom: 6px; border-radius: 10px; background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; font-size: 14px; }
        .m-item.active { background: var(--p); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        .img-box { border-radius: 15px; overflow: hidden; background: #222; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .quiz { display: flex; flex-direction: column; gap: 15px; }
        .q-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; font-size: 20px; line-height: 1.5; border-left: 4px solid var(--p); }
        .blank { color: #facc15; font-weight: 700; border-bottom: 2px solid #facc15; }

        .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .opt.correct { background: #22c55e !important; }
        .opt.wrong { background: #ef4444 !important; }
        
        #feedback { background: rgba(99, 102, 241, 0.2); padding: 15px; border-radius: 15px; display: none; }
        .btn-next { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--p); color: white; font-weight: 700; cursor: pointer; margin-top: auto; }
    </style>
</head>
<body>

<div class="glass">
    <div class="header">
        <div class="nav">
            <button class="nav-btn active" id="b-learn" onclick="tab('learn')">✍️ Học tập</button>
            <button class="nav-btn" id="b-config" onclick="tab('config')">⚙️ Cài đặt</button>
        </div>
        <div class="stats">🔥 Streak: <span id="s-streak">0</span> | Học: <span id="s-total">0</span></div>
    </div>

    <div id="p-learn" class="main">
        <div class="menu" id="menu"></div>
        <div class="img-box"><img id="img" src=""></div>
        <div class="quiz">
            <div class="q-card" id="q-txt">Đang chuẩn bị...</div>
            <div class="opts" id="opts"></div>
            <div id="feedback">
                <h3 id="fb-w" style="color:#facc15"></h3>
                <p id="fb-d" style="font-size:14px; opacity:0.9"></p>
            </div>
            <button class="btn-next" id="btn-n" style="display:none" onclick="goNext()">TIẾP THEO ➔</button>
        </div>
    </div>

    <div id="p-config" style="display:none; flex-direction:column; gap:15px">
        <textarea id="inp" style="width:100%; height:350px; background:rgba(0,0,0,0.3); color:#818cf8; border-radius:15px; padding:15px; border:1px solid #444;" placeholder="Dán JSON vào đây..."></textarea>
        <button class="btn-next" onclick="save()">LƯU DỮ LIỆU & BẮT ĐẦU</button>
    </div>
</div>

<script>
    let db = [], cur = 0, st = {total:0, day:"", streak:1};

    window.onload = () => {
        // Tự dọn dẹp các phiên bản cũ bị xung đột
        if(localStorage.getItem('v3_data') || localStorage.getItem('v_data')) {
            const tempStats = localStorage.getItem('v3_stats') || localStorage.getItem('v_stats');
            localStorage.clear();
            if(tempStats) localStorage.setItem('v_final_st', tempStats);
        }

        const d = localStorage.getItem('v_final_data');
        const s = localStorage.getItem('v_final_st');
        if(s) st = JSON.parse(s);
        
        // Streak logic
        const today = new Date().toDateString();
        if(st.day && st.day !== today) {
            const gap = (new Date(today) - new Date(st.day)) / 86400000;
            st.streak = (gap === 1) ? st.streak + 1 : 1;
        }
        st.day = today;

        if(d) { db = JSON.parse(d); show(); } 
        else { tab('config'); }
        updateUI();
    };

    function show() {
        if(!db.length) return;
        const m = document.getElementById('menu'); m.innerHTML = "";
        db.forEach((it, i) => {
            const dv = document.createElement('div');
            dv.className = `m-item ${i===cur?'active':''}`;
            dv.innerText = `${i+1}. ${it.word}`;
            dv.onclick = () => { cur=i; show(); };
            m.appendChild(dv);
        });

        const it = db[cur];
        document.getElementById('img').src = it.img;
        document.getElementById('q-txt').innerHTML = it.example.replace(new RegExp(it.word, 'gi'), '<span class="blank">_______</span>');
        
        const oB = document.getElementById('opts'); oB.innerHTML = "";
        let cs = [it.word];
        while(cs.length < 4) {
            let r = db[Math.floor(Math.random()*db.length)].word;
            if(!cs.includes(r)) cs.push(r);
        }
        cs.sort(() => Math.random() - 0.5).forEach(c => {
            const b = document.createElement('div'); b.className = 'opt'; b.innerText = c;
            b.onclick = () => {
                document.querySelectorAll('.opt').forEach(x => x.style.pointerEvents = 'none');
                if(c === it.word) { b.classList.add('correct'); st.total++; }
                else { 
                    b.classList.add('wrong');
                    document.querySelectorAll('.opt').forEach(x => { if(x.innerText === it.word) x.classList.add('correct'); });
                }
                document.getElementById('fb-w').innerText = it.word;
                document.getElementById('fb-d').innerText = "Nghĩa: " + it.definition;
                document.getElementById('feedback').style.display = 'block';
                document.getElementById('btn-n').style.display = 'block';
                updateUI();
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(it.word));
            };
            oB.appendChild(b);
        });
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('btn-n').style.display = 'none';
    }

    function updateUI() {
        document.getElementById('s-total').innerText = st.total;
        document.getElementById('s-streak').innerText = st.streak;
        localStorage.setItem('v_final_st', JSON.stringify(st));
    }
    function goNext() { cur = (cur + 1) % db.length; show(); }
    function tab(t) {
        document.getElementById('p-learn').style.display = t==='learn'?'grid':'none';
        document.getElementById('p-config').style.display = t==='config'?'flex':'none';
        document.getElementById('b-learn').classList.toggle('active', t==='learn');
        document.getElementById('b-config').classList.toggle('active', t==='config');
    }
    function save() {
        const v = document.getElementById('inp').value;
        if(v) { localStorage.setItem('v_final_data', v); location.reload(); }
    }
</script>
</body>
</html>
