<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Vocab Master - Tự Thêm Từ Vựng</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --bg: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .container { width: 100%; max-width: 900px; background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .nav-btn { padding: 8px 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; background: rgba(255,255,255,0.1); color: #94a3b8; margin-left: 10px; }
        .nav-btn.active { background: var(--p); color: white; }

        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .img-box { border-radius: 15px; overflow: hidden; height: 300px; background: #000; border: 1px solid #334155; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .q-text { font-size: 20px; font-weight: 700; margin-bottom: 15px; line-height: 1.5; color: #e2e8f0; }
        .blank { color: #facc15; border-bottom: 2px solid #facc15; }
        
        .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #334155; border-radius: 10px; cursor: pointer; text-align: center; font-weight: 700; transition: 0.2s; }
        .correct { background: #16a34a !important; border-color: #22c55e !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }
        
        .fb-box { margin-top: 15px; padding: 15px; background: rgba(99, 102, 241, 0.1); border-radius: 12px; border-left: 4px solid var(--p); display: none; }
        .next-btn { width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px; border: none; background: var(--p); color: white; font-weight: 700; cursor: pointer; }

        #view-admin textarea { width: 100%; height: 300px; background: #000; color: #4ade80; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 13px; }
        .admin-btns { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="stats">🔥 Streak: <span id="streak">1</span> | Đúng: <span id="score">0</span></div>
        <div>
            <button class="nav-btn active" id="btn-home" onclick="showTab('home')">📖 Học</button>
            <button class="nav-btn" id="btn-admin" onclick="showTab('admin')">➕ Thêm từ</button>
        </div>
    </div>

    <div id="view-home" class="main-layout">
        <div class="img-box"><img id="q-img" src=""></div>
        <div>
            <div class="q-text" id="q-body"></div>
            <div class="opts" id="q-opts"></div>
            <div class="fb-box" id="fb">
                <h3 id="fb-w" style="color:#facc15"></h3>
                <p id="fb-d" style="font-size:14px"></p>
            </div>
            <button class="next-btn" id="btn-next" style="display:none" onclick="goNext()">TIẾP THEO ➔</button>
        </div>
    </div>

    <div id="view-admin" style="display:none">
        <h3 style="margin-bottom:10px">Danh sách từ vựng (JSON)</h3>
        <textarea id="json-input"></textarea>
        <div class="admin-btns">
            <button class="next-btn" style="background:#16a34a" onclick="saveData()">💾 LƯU THAY ĐỔI</button>
            <button class="next-btn" style="background:#475569" onclick="resetDefault()">🔄 KHÔI PHỤC GỐC</button>
        </div>
        <p style="font-size:12px; margin-top:10px; color:#94a3b8">* Bạn có thể thêm từ mới vào danh sách trên theo đúng cấu trúc.</p>
    </div>
</div>

<script>
    const defaultData = [
        {"word":"Abutment","definition":"Mố cầu","example":"The bridge abutment provides support.","img":"https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=600"},
        {"word":"Steel","definition":"Thép","example":"The frame is made of steel.","img":"https://images.unsplash.com/photo-1516156008625-3a9d6067fab5?w=600"}
    ];

    let db = [], cur = 0, score = 0;

    function init() {
        const saved = localStorage.getItem('my_vocab_v1');
        db = saved ? JSON.parse(saved) : defaultData;
        document.getElementById('json-input').value = JSON.stringify(db, null, 2);
        loadQuestion();
    }

    function loadQuestion() {
        if(db.length === 0) {
            document.getElementById('q-body').innerText = "Chưa có từ nào, hãy vào phần Thêm từ!";
            return;
        }
        const it = db[cur];
        document.getElementById('q-img').src = it.img;
        document.getElementById('q-body').innerHTML = it.example.replace(new RegExp(it.word, 'gi'), '<span class="blank">_______</span>');
        
        let pool = [it.word];
        while(pool.length < Math.min(4, db.length)) {
            let r = db[Math.floor(Math.random()*db.length)].word;
            if(!pool.includes(r)) pool.push(r);
        }
        pool.sort(() => Math.random() - 0.5);

        const box = document.getElementById('q-opts'); box.innerHTML = "";
        pool.forEach(o => {
            const b = document.createElement('div'); b.className = 'opt'; b.innerText = o;
            b.onclick = () => {
                document.querySelectorAll('.opt').forEach(x => x.style.pointerEvents = 'none');
                if(o === it.word) { b.classList.add('correct'); score++; }
                else { 
                    b.classList.add('wrong');
                    document.querySelectorAll('.opt').forEach(x => { if(x.innerText === it.word) x.classList.add('correct'); });
                }
                document.getElementById('fb-w').innerText = it.word;
                document.getElementById('fb-d').innerText = it.definition;
                document.getElementById('fb').style.display = 'block';
                document.getElementById('btn-next').style.display = 'block';
                document.getElementById('score').innerText = score;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(it.word));
            };
            box.appendChild(b);
        });
        document.getElementById('fb').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';
    }

    function goNext() { cur = (cur + 1) % db.length; loadQuestion(); }

    function showTab(t) {
        document.getElementById('view-home').style.display = t === 'home' ? 'grid' : 'none';
        document.getElementById('view-admin').style.display = t === 'admin' ? 'block' : 'none';
        document.getElementById('btn-home').className = 'nav-btn' + (t==='home'?' active':'');
        document.getElementById('btn-admin').className = 'nav-btn' + (t==='admin'?' active':'');
    }

    function saveData() {
        try {
            const val = document.getElementById('json-input').value;
            db = JSON.parse(val);
            localStorage.setItem('my_vocab_v1', val);
            alert("Đã lưu thành công!");
            location.reload();
        } catch(e) { alert("Lỗi JSON! Bạn hãy kiểm tra kỹ dấu phẩy và dấu ngoặc."); }
    }

    function resetDefault() {
        if(confirm("Xóa hết từ hiện tại và quay về mặc định?")) {
            localStorage.removeItem('my_vocab_v1');
            location.reload();
        }
    }

    window.onload = init;
</script>
</body>
</html>
